<!DOCTYPE html>
<html>
<head>
    <title>Product List</title>
    <style>
        body {
            font-family: Arial;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        h3 {
            margin: 10px 0;
        }
        p {
            font-size: 14px;
        }
        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>All Products</h1>

    <div class="container">
        {% for product in products %}
            <div class="card">
                <img src="{{ product.product_image.url }}" alt="{{ product.product_name }}">
                
                <h3>{{ product.product_name }}</h3>
                
                <p>{{ product.product_description }}</p>
                
                <p class="price">₹{{ product.product_price }}</p>
            </div>
        {% endfor %}
    </div>

</body>
</html>
